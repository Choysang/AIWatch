# Build the web + worker images and push them to GitHub Container Registry (GHCR).
#
# Why this exists: the production ECS box (3.5 GB RAM) OOM-thrashed when building images
# locally. Builds now happen on GitHub's runners; the ECS box only pulls. Images inherit
# the repository's visibility, so a private repo yields private images.
#
# Triggers:
#   - workflow_dispatch: build/push :latest + :sha on demand (the normal release path).
#   - push of a v* tag:   also publishes a :vX.Y.Z image for that release.
#
# Pull side: see docker-compose.prod.yml + .deploy/deploy.sh on the server.

name: Release (build & push images)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [web, worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so an owner like "Choysang" is fine.
          images: ghcr.io/${{ github.repository_owner }}/aiwatch-${{ matrix.component }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.component }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
