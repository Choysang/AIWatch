# Local development / self-host topology (decision F/15: `docker compose up` is the
# primary self-host path — Postgres + web + worker). The hosted shape mirrors this:
# containerized web + single Bun worker + managed Postgres + CDN.
#
# Quick start:
#   cp .env.example .env   # set BETTER_AUTH_SECRET; LLM/connector keys optional
#   docker compose up --build
#   docker compose run --rm web bun run db:seed:demo        # optional demo data
#   docker compose run --rm web bun run setup:owner you@example.com 'password'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiwatch
      POSTGRES_PASSWORD: aiwatch
      POSTGRES_DB: aiwatch
    ports:
      - "5432:5432"
    volumes:
      - aiwatch_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiwatch -d aiwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://aiwatch:aiwatch@db:5432/aiwatch
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://aiwatch:aiwatch@db:5432/aiwatch
      TZ: ${APP_TZ:-Asia/Shanghai}
    depends_on:
      db:
        condition: service_healthy

volumes:
  aiwatch_pg:
